name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/TOKENPAPSYSTEM
            
            # Tell Git it is safe to run commands in this folder even if it is owned by nginx
            git config --global --add safe.directory /var/www/TOKENPAPSYSTEM
            
            # Fetch latest changes from github
            git fetch origin master
            git reset --hard origin/master
            git clean -fd
            
            # Use root safely for composer
            export COMPOSER_ALLOW_SUPERUSER=1
            composer install --no-dev --no-interaction --optimize-autoloader
            
            # Clear Laravel Caches and regenerate
            php artisan config:clear
            php artisan cache:clear
            php artisan view:clear
            php artisan route:clear
            php artisan optimize:clear
            
            # Run Migrations
            php artisan migrate --force
            
            # Fix Ownership permissions for Nginx & PHP-FPM
            chown -R nginx:nginx /var/www/TOKENPAPSYSTEM
            chmod -R 777 storage bootstrap/cache
            
            # Restart Services to clear opcache safely
            systemctl restart php-fpm
